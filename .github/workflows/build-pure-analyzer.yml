name: Build Pure Analyzer

on:
  push:
    branches: [main]
    paths:
      - "FSharp.PureAnalyzer/**"
      - ".github/workflows/build-pure-analyzer.yml"
  pull_request:
    paths:
      - "FSharp.PureAnalyzer/**"
      - ".github/workflows/build-pure-analyzer.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR (devcontainer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pure Analyzer inside the project devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            set -euo pipefail
            export TMPDIR="$HOME/.nuget-tmp"
            mkdir -p "$TMPDIR"
            cd FSharp.PureAnalyzer
            paket restore
            dotnet build -c Release
