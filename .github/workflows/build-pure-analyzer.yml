name: Build Pure Analyzer

on:
  push:
    branches: [main]
    paths:
      - "FSharp.PureAnalyzer/**"
      - ".github/workflows/build-pure-analyzer.yml"
  pull_request:
    paths:
      - "FSharp.PureAnalyzer/**"
      - ".github/workflows/build-pure-analyzer.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools and paket
        run: |
          set -euo pipefail
          dotnet tool restore
          cd FSharp.PureAnalyzer
          paket restore

      - name: Build
        run: |
          set -euo pipefail
          cd FSharp.PureAnalyzer
          dotnet build -c Release --no-restore
