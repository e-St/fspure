name: Release Pure Analyzer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pack (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR (devcontainer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF_NAME}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pack and publish Pure Analyzer inside the project devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            set -euo pipefail
            export TMPDIR="$HOME/.nuget-tmp"
            mkdir -p "$TMPDIR"
            cd FSharp.PureAnalyzer
            paket restore
            dotnet build -c Release
            dotnet pack FSharp.PureAnalyzer.fsproj \
              -c Release \
              -o ./nupkgs \
              /p:Version="$VERSION" \
              --no-build
            dotnet nuget push ./nupkgs/*.nupkg \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
              --skip-duplicate
